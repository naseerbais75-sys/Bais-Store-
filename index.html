<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bais Naseer Presents | Flash Store v1</title>

<style>
:root { --neon: #00f2ff; --bg: #050505; --card: #111; --wa: #25d366; --yt: #ff0000; }
body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

/* --- LOGIN / OTP SYSTEM --- */
#login-screen {
    position: fixed; width: 100%; height: 100%; background: black;
    z-index: 2000; display: flex; flex-direction: column; 
    justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
}
.login-box {
    width: 100%; max-width: 350px; background: #111; padding: 30px;
    border-radius: 20px; border: 1px solid var(--neon); text-align: center;
    box-shadow: 0 0 25px rgba(0, 242, 255, 0.2);
}
input {
    width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px;
    border: 1px solid #333; background: #000; color: white; outline: none;
}
input:focus { border-color: var(--neon); }
.btn-wa { background: var(--wa); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
.btn-verify { background: var(--neon); color: black; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }

/* --- SPLASH SCREEN --- */
#splash {
    position: fixed; width: 100%; height: 100%; background: black;
    display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1500;
}
.bolt {
    width: 60px; height: 90px; background: var(--neon);
    clip-path: polygon(45% 0%, 100% 0%, 70% 45%, 100% 45%, 30% 100%, 50% 55%, 10% 55%);
    animation: glow 1s infinite alternate;
}
@keyframes glow { from { filter: drop-shadow(0 0 5px var(--neon)); } to { filter: drop-shadow(0 0 20px var(--neon)); } }

/* --- FLOATING YOUTUBE --- */
.yt-float {
    position: fixed; width: 50px; height: 50px; background: var(--yt);
    bottom: 25px; left: 25px; border-radius: 50%; z-index: 100;
    display: flex; justify-content: center; align-items: center;
    box-shadow: 0 0 15px rgba(255,0,0,0.5);
    animation: bounce 3s infinite ease-in-out; cursor: pointer; text-decoration: none;
}
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

/* --- HEADER --- */
header { padding: 20px; background: #111; border-bottom: 2px solid var(--neon); text-align: center; position: relative; }
.rgb-text {
    background: linear-gradient(to right, #ff0000, #00ff00, #00f2ff, #ff00ff, #ff0000);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-size: 300%; animation: rgb 5s infinite linear;
}
@keyframes rgb { 0% { background-position: 0%; } 100% { background-position: 300%; } }

/* --- TABS / GROUPS --- */
.tabs { display: flex; background: #0a0a0a; overflow-x: auto; padding: 10px; gap: 10px; border-bottom: 1px solid #222; }
.tab-btn { 
    padding: 8px 20px; border: 1px solid #333; background: transparent; 
    color: #888; border-radius: 20px; white-space: nowrap; cursor: pointer; font-size: 12px;
}
.tab-btn.active { background: var(--neon); color: black; border-color: var(--neon); font-weight: bold; }

/* --- APPS LIST --- */
.apps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
.card {
    background: var(--card); border-radius: 15px; padding: 20px 10px;
    border: 1px solid #222; text-align: center; transition: 0.2s; cursor: pointer;
}
.card:active { transform: scale(0.95); border-color: var(--neon); }

/* --- DETAIL PAGE --- */
#detail-page {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: black; display: none; z-index: 900; padding: 30px; box-sizing: border-box;
}
.bar-bg { height: 8px; background: #222; border-radius: 10px; margin: 25px 0; overflow: hidden; }
.bar-fill { height: 100%; width: 0%; background: var(--neon); }
.install-btn { width: 100%; padding: 18px; border: none; background: var(--neon); color: black; font-weight: 900; border-radius: 10px; }

/* --- SETTINGS --- */
#settings-modal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9); z-index: 1001;
}
.s-box { background: #111; width: 80%; max-width: 320px; margin: 40% auto; padding: 25px; border-radius: 20px; border: 1px solid var(--neon); text-align: center;}
</style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 class="rgb-text">FLASH STORE</h2>
        <input type="text" id="u-name" placeholder="Enter Name">
        <button class="btn-wa" onclick="getOTP()">GET CODE VIA WHATSAPP</button>
        <div style="margin: 10px 0; color: #444; font-size: 10px;">VERIFY ACCESS</div>
        <input type="text" id="u-otp" placeholder="Enter Secret Key">
        <button class="btn-verify" onclick="verifyOTP()">VERIFY & ENTER</button>
    </div>
</div>

<div id="splash" style="display:none">
    <div class="bolt"></div>
    <h2 class="rgb-text" style="margin-top:20px;">BAIS NASEER</h2>
    <p style="font-size: 10px; letter-spacing: 3px; color: #555;">FLASH STORE V1</p>
</div>

<a href="https://youtube.com/@baisgaminglive" target="_blank" class="yt-float">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
</a>

<div id="main-ui" style="display:none">
    <header>
        <div style="font-size: 10px; color: var(--neon); letter-spacing: 2px;">BAIS NASEER PRESENTS</div>
        <div class="rgb-text" style="font-size: 26px; font-weight: 900;">FLASH STORE V1</div>
        <div onclick="toggleSettings()" style="position:absolute; right:20px; top:25px; cursor:pointer; font-size: 20px;">⚙️</div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="filterApps('All', this)">All</button>
        <button class="tab-btn" onclick="filterApps('Cricket', this)">Cricket Mods</button>
        <button class="tab-btn" onclick="filterApps('Design', this)">PLP Files</button>
        <button class="tab-btn" onclick="filterApps('Gaming', this)">Other Games</button>
    </div>

    <div class="apps-grid" id="apps-box"></div>
</div>

<div id="detail-page">
    <button onclick="hideDetails()" style="background:none; border:none; color:var(--neon); font-weight:bold; cursor:pointer;">← BACK</button>
    <div style="text-align: center; margin-top: 40px;">
        <div id="dIcon" style="font-size: 60px;"></div>
        <h1 id="dTitle" class="rgb-text" style="margin: 15px 0;"></h1>
        <p id="dDev" style="color:var(--neon); font-size: 12px; font-weight: bold;"></p>
        <p id="dDesc" style="color:#777; font-size: 14px;"></p>
        <div class="bar-bg"><div class="bar-fill" id="fBar"></div></div>
        <button class="install-btn" id="i-btn" onclick="startInstall()">INSTALL NOW</button>
    </div>
</div>

<div id="settings-modal" onclick="toggleSettings()">
    <div class="s-box" onclick="event.stopPropagation()">
        <h3 style="color:var(--neon); margin: 0 0 20px 0;">Options</h3>
        <button onclick="window.open('https://youtube.com/@baisgaminglive')" style="background:#333; color:white; border:none; padding:12px; width:100%; border-radius:10px; margin-bottom:10px;">Visit YouTube</button>
        <button onclick="logout()" style="color:red; background:none; border:1px solid red; padding: 10px; width: 100%; border-radius: 10px; font-weight:bold; cursor:pointer;">LOGOUT DEVICE</button>
    </div>
</div>

<script>
const myWA = "923234787263";

const apps = [
    { name: "Cricket PLP Files", dev: "Baltistani Gamer", group: "Design", icon: "📄", link: "https://play.google.com/store/apps/details?id=com.uswatechnologies.cricketplpstore", desc: "Premium cricket design PLP assets." },
    { name: "Real Cricket Mod", dev: "Nautilus", group: "Cricket", icon: "🏏", link: "https://play.google.com/store/apps/details?id=com.nautilus.realcricket", desc: "Realistic cricket mod with unlocked features." },
    { name: "WCC 3 MOD", dev: "Nextwave", group: "Cricket", icon: "🏟️", link: "https://play.google.com/store/apps/details?id=com.nextwave.wcc3", desc: "Next-gen graphics mod." },
    { name: "PUBG Mobile", dev: "Tencent", group: "Gaming", icon: "🔫", link: "https://play.google.com/store/apps/details?id=com.tencent.ig", desc: "Battle royale experience." },
    { name: "Free Fire", dev: "Garena", group: "Gaming", icon: "🔥", link: "https://play.google.com/store/apps/details?id=com.dts.freefireth", desc: "Fast survival action." }
];

let selectedApp = null;

window.onload = function() {
    if(localStorage.getItem("flash_access")) {
        document.getElementById('login-screen').style.display = 'none';
        launchApp();
    }
}

// DYNAMIC KEY LOGIC
function getDynamicKey() {
    const date = new Date();
    return "FLASH" + ((date.getDate() + date.getHours()) * 7);
}

function getOTP() {
    const name = document.getElementById('u-name').value;
    if(!name) return alert("Enter Name!");
    const rID = "BAIS-" + Math.floor(Math.random() * 899999 + 100000) + "-DEV";
    const msg = `Assalam o Alaikum Bais! I am ${name}. Request Code: ${rID}. Give me the Real Key.`;
    window.open(`https://wa.me/${myWA}?text=${encodeURIComponent(msg)}`, '_blank');
}

function verifyOTP() {
    const key = document.getElementById('u-otp').value;
    if(key === getDynamicKey()) {
        localStorage.setItem("flash_access", "true");
        document.getElementById('login-screen').style.display = 'none';
        launchApp();
    } else { alert("Invalid Key!"); }
}

function launchApp() {
    document.getElementById('splash').style.display = 'flex';
    setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        renderApps('All');
    }, 2500);
}

function renderApps(category) {
    const box = document.getElementById('apps-box');
    box.innerHTML = "";
    const filtered = category === 'All' ? apps : apps.filter(a => a.group === category);
    filtered.forEach(app => {
        box.innerHTML += `
            <div class="card" onclick='showDetails(${JSON.stringify(app)})'>
                <div style="font-size: 35px;">${app.icon}</div>
                <div style="margin-top:10px; font-weight:bold; font-size:13px;">${app.name}</div>
                <div style="font-size:9px; color:var(--neon);">${app.dev}</div>
            </div>`;
    });
}

function filterApps(cat, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderApps(cat);
}

function showDetails(app) {
    selectedApp = app;
    document.getElementById('detail-page').style.display = 'block';
    document.getElementById('dTitle').innerText = app.name;
    document.getElementById('dIcon').innerText = app.icon;
    document.getElementById('dDev').innerText = "Developer: " + app.dev;
    document.getElementById('dDesc').innerText = app.desc;
    document.getElementById('fBar').style.width = "0%";
}

function hideDetails() { document.getElementById('detail-page').style.display = 'none'; }

function startInstall() {
    let p = 0; let btn = document.getElementById('i-btn');
    btn.disabled = true; btn.innerText = "DOWNLOADING...";
    let timer = setInterval(() => {
        p += 5; document.getElementById('fBar').style.width = p + "%";
        if(p >= 100) {
            clearInterval(timer);
            btn.innerText = "OPEN STORE";
            window.open(selectedApp.link, "_blank");
            setTimeout(() => { btn.disabled = false; btn.innerText = "INSTALL NOW"; }, 2000);
        }
    }, 100);
}

function toggleSettings() {
    const m = document.getElementById('settings-modal');
    m.style.display = (m.style.display == 'block') ? 'none' : 'block';
}

function logout() {
    localStorage.removeItem("flash_access");
    location.reload();
}
</script>

</body>
</html>
